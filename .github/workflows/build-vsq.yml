name: 远程构建 ViScriptQuests

on:
  workflow_dispatch:          # 手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 签出上游仓库代码
        uses: actions/checkout@v4
        with:
          repository: zhenshiz/ViScriptQuests   # 指定别人的公开仓库
          ref: master                           # 或 master，根据默认分支

      - name: 设置 JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 授予 gradlew 执行权限
        run: chmod +x ./gradlew

      - name: 构建模组
        run: ./gradlew build

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ViScriptQuests-Artifacts
          path: build/libs/*.jar
