name: 远程构建 LDLib2

on:
  workflow_dispatch:          # 手动触发
  schedule:
    - cron: '0 0 * * 0'      # 可选：每周日 UTC 0 点自动构建一次

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 签出上游仓库代码
        uses: actions/checkout@v4
        with:
          repository: YMRwithNoworry/LDLib2
          ref: 1.21                     # 请根据实际情况修改分支名，可能是 main 或 1.20.1

      - name: 设置 JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 授予 gradlew 执行权限
        run: chmod +x ./gradlew

      - name: 缓存 Gradle 依赖（加速构建）
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: 构建模组（Fabric + Forge）
        run: ./gradlew buildAll --no-daemon
        env:
          ORG_GRADLE_JAVA_HOME: ${{ env.JAVA_HOME }}  # 覆盖硬编码的 Windows 路径

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: LDLib2-Artifacts
          path: |
            fabric/build/libs/*.jar
            forge/build/libs/*.jar
            common/build/libs/*.jar
