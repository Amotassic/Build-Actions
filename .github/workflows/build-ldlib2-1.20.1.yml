name: 远程构建 LDLib2

on:
  workflow_dispatch:          # 手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 签出上游仓库代码
        uses: actions/checkout@v4
        with:
          repository: Ku00115/LDLib2-Forge-1.20.1
          ref: main                     # 请根据实际情况修改分支名，可能是 main 或 1.20.1

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 授予 gradlew 执行权限
        run: chmod +x ./gradlew

      - name: 缓存 Gradle 依赖（加速构建）
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: 清理硬编码的 JDK 路径
        run: |
          sed -i '/^org.gradle.java.home=/d' gradle.properties
          sed -i '/maven.aliyun.com/d' build.gradle
          sed -i '/maven.aliyun.com/d' settings.gradle

      - name: 构建模组
        run: ./gradlew build --no-daemon

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: LDLib2-Artifacts
          path: |
            build/libs/*.jar
