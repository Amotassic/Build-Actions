name: Build Chatbox Mod

on:
  workflow_dispatch:  # 手动触发
    inputs:
      version:
        description: '构建的 Minecraft 版本'
        required: true
        default: '1.21.11'
        type: string
      build_fabric:
        description: '构建 Fabric 版本'
        required: false
        default: true
        type: boolean
      build_neoforge:
        description: '构建 NeoForge 版本'
        required: false
        default: true
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # 支持同时构建多个 Java 版本（如果需要）
        java: [ '17', '21' ]
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        repository: 'zhenshiz/chatbox'
        ref: '1.21.11'  # 指定分支
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Setup Java ${{ matrix.java }}
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: ${{ matrix.java }}
    
    - name: Validate Java version for Minecraft
      run: |
        # 检查项目要求的 Java 版本
        if [ -f "gradle.properties" ]; then
          echo "项目 Java 要求:"
          grep -i "java" gradle.properties || true
        fi
        
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: wrapper  # 使用项目自带的 gradle wrapper
    
    - name: Make gradlew executable
      run: chmod +x gradlew
    
    - name: Clean previous builds
      run: ./gradlew clean
    
    - name: Build Fabric Module
      if: ${{ inputs.build_fabric == true }}
      run: |
        echo "正在构建 Fabric 模块..."
        ./gradlew :fabric:build --no-daemon --stacktrace
      env:
        # 添加构建环境变量
        MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
    
    - name: Build NeoForge Module
      if: ${{ inputs.build_neoforge == true }}
      run: |
        echo "正在构建 NeoForge 模块..."
        ./gradlew :neoforge:build --no-daemon --stacktrace
      env:
        MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
    
    - name: List generated artifacts
      run: |
        echo "=== Fabric 构建输出 ==="
        find . -path "*/fabric/build/libs/*.jar" -type f | grep -v ".gradle" | sort || echo "未找到 Fabric JAR 文件"
        
        echo -e "\n=== NeoForge 构建输出 ==="
        find . -path "*/neoforge/build/libs/*.jar" -type f | grep -v ".gradle" | sort || echo "未找到 NeoForge JAR 文件"
        
        echo -e "\n=== 所有构建输出 ==="
        find build -name "*.jar" -type f 2>/dev/null || true
    
    - name: Upload Fabric artifacts
      if: ${{ inputs.build_fabric == true }}
      uses: actions/upload-artifact@v4
      with:
        name: chatbox-fabric-${{ inputs.version }}-java${{ matrix.java }}
        path: |
          fabric/build/libs/*.jar
          fabric/build/outputs/**/*.jar
        retention-days: 30
        if-no-files-found: error
    
    - name: Upload NeoForge artifacts
      if: ${{ inputs.build_neoforge == true }}
      uses: actions/upload-artifact@v4
      with:
        name: chatbox-neoforge-${{ inputs.version }}-java${{ matrix.java }}
        path: |
          neoforge/build/libs/*.jar
          neoforge/build/outputs/**/*.jar
        retention-days: 30
        if-no-files-found: error
    
    - name: Upload build reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-reports-java${{ matrix.java }}
        path: |
          **/build/reports/**/*.html
          **/build/reports/**/*.xml
        retention-days: 7
    
    - name: Generate build summary
      if: always()
      run: |
        echo "## 构建总结" >> $GITHUB_STEP_SUMMARY
        echo "- **Java 版本**: ${{ matrix.java }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Minecraft 版本**: ${{ inputs.version }}" >> $GITHUB_STEP_SUMMARY
        echo "- **构建 Fabric**: ${{ inputs.build_fabric }}" >> $GITHUB_STEP_SUMMARY
        echo "- **构建 NeoForge**: ${{ inputs.build_neoforge }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        # 检查构建结果
        if [ -f "fabric/build/libs/fabric*.jar" ] || [ -f "neoforge/build/libs/neoforge*.jar" ]; then
          echo "✅ 构建成功！" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ inputs.build_fabric }}" = "true" ]; then
            echo "**Fabric 构建结果:**" >> $GITHUB_STEP_SUMMARY
            find fabric/build/libs -name "*.jar" 2>/dev/null | while read file; do
              echo "- $(basename "$file") ($(du -h "$file" | cut -f1))" >> $GITHUB_STEP_SUMMARY
            done || echo "无 Fabric JAR 文件" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ inputs.build_neoforge }}" = "true" ]; then
            echo "**NeoForge 构建结果:**" >> $GITHUB_STEP_SUMMARY
            find neoforge/build/libs -name "*.jar" 2>/dev/null | while read file; do
              echo "- $(basename "$file") ($(du -h "$file" | cut -f1))" >> $GITHUB_STEP_SUMMARY
            done || echo "无 NeoForge JAR 文件" >> $GITHUB_STEP_SUMMARY
          fi
        else
          echo "❌ 构建失败或未生成 JAR 文件" >> $GITHUB_STEP_SUMMARY
        fi
        
    - name: Cache Gradle dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
