name: Build Chatbox Mod

on:
  workflow_dispatch:
    inputs:
      source_repo:
        description: 'Source repository to build'
        required: true
        default: 'zhenshiz/chatbox'
        type: string
      source_branch:
        description: 'Branch to build'
        required: true
        default: '1.21.11'
        type: string

jobs:
  build-external-mod:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        java-version: [21]
    
    steps:
    - name: Checkout external repository
      uses: actions/checkout@v4
      with:
        repository: ${{ github.event.inputs.source_repo }}
        ref: ${{ github.event.inputs.source_branch }}
        token: ${{ secrets.GITHUB_TOKEN }}
        path: mod-source

    - name: Display repository info
      run: |
        cd mod-source
        echo "=== Repository Information ==="
        echo "Repository: ${{ github.event.inputs.source_repo }}"
        echo "Branch: ${{ github.event.inputs.source_branch }}"
        echo "Commit: $(git rev-parse HEAD)"
        echo "Last commit: $(git log -1 --pretty=format:'%h %s (%an, %ad)')"
        echo "=========================="

    - name: Setup JDK ${{ matrix.java-version }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ matrix.java-version }}
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-home-cache-cleanup: true

    - name: Make gradlew executable
      run: |
        cd mod-source
        chmod +x ./gradlew

    - name: Cache Gradle dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
          mod-source/.gradle
        key: ${{ runner.os }}-gradle-${{ hashFiles('mod-source/**/*.gradle*', 'mod-source/**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Validate Gradle wrapper
      run: |
        cd mod-source
        ./gradlew --version

    - name: Build with Gradle
      run: |
        cd mod-source
        echo "Starting build process..."
        ./gradlew build --build-cache --parallel --daemon

    - name: Run tests
      run: |
        cd mod-source
        ./gradlew test --build-cache --parallel || echo "No tests found or tests failed"

    - name: Generate sources JAR
      run: |
        cd mod-source
        ./gradlew sourcesJar || echo "Sources JAR generation skipped"

    - name: Find and organize artifacts
      run: |
        cd mod-source
        echo "=== Searching for build artifacts ==="
        
        # 创建输出目录
        mkdir -p ../artifacts/neoforge
        mkdir -p ../artifacts/fabric
        mkdir -p ../artifacts/common
        mkdir -p ../artifacts/root
        mkdir -p ../artifacts/sources
        
        # 查找NeoForge artifacts
        find . -path "*/neoforge/build/libs/*.jar" -not -name "*-sources.jar" -not -name "*-dev.jar" -not -name "*-slim.jar" -exec cp {} ../artifacts/neoforge/ \; 2>/dev/null || true
        
        # 查找Fabric artifacts
        find . -path "*/fabric/build/libs/*.jar" -not -name "*-sources.jar" -not -name "*-dev.jar" -not -name "*-slim.jar" -exec cp {} ../artifacts/fabric/ \; 2>/dev/null || true
        
        # 查找Common artifacts
        find . -path "*/common/build/libs/*.jar" -not -name "*-sources.jar" -not -name "*-dev.jar" -not -name "*-slim.jar" -exec cp {} ../artifacts/common/ \; 2>/dev/null || true
        
        # 查找根目录build中的artifacts
        find . -maxdepth 2 -path "./build/libs/*.jar" -not -name "*-sources.jar" -not -name "*-dev.jar" -not -name "*-slim.jar" -exec cp {} ../artifacts/root/ \; 2>/dev/null || true
        
        # 查找sources
        find . -name "*-sources.jar" -exec cp {} ../artifacts/sources/ \; 2>/dev/null || true
        
        # 列出找到的所有artifacts
        echo "=== Found artifacts ==="
        for dir in neoforge fabric common root sources; do
          if [ -n "$(ls -A ../artifacts/$dir 2>/dev/null)" ]; then
            echo "--- $dir artifacts ---"
            ls -la ../artifacts/$dir/
          fi
        done

    - name: Upload NeoForge artifacts
      uses: actions/upload-artifact@v4
      with:
        name: chatbox-neoforge-${{ github.run_number }}
        path: artifacts/neoforge/*.jar
        retention-days: 30
        if-no-files-found: ignore

    - name: Upload Fabric artifacts
      uses: actions/upload-artifact@v4
      with:
        name: chatbox-fabric-${{ github.run_number }}
        path: artifacts/fabric/*.jar
        retention-days: 30
        if-no-files-found: ignore

    - name: Generate build information
      run: |
        cat > build-info.txt << EOF
        Build Information:
        - Source Repository: ${{ github.event.inputs.source_repo }}
        - Source Branch: ${{ github.event.inputs.source_branch }}
        - Build Date: $(date)
        - GitHub Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        - Commit: $(cd mod-source && git rev-parse HEAD)
        - Commit Message: $(cd mod-source && git log -1 --pretty=format:'%s')
        - Author: $(cd mod-source && git log -1 --pretty=format:'%an')
        
        Available Artifacts:
        EOF
        
        # 添加artifacts信息
        for dir in neoforge fabric common root sources; do
          if [ -n "$(ls -A artifacts/$dir 2>/dev/null)" ]; then
            echo "- $dir artifacts: $(ls artifacts/$dir/ | tr '\n' ', ')" >> build-info.txt
          fi
        done
        
        cat build-info.txt

    - name: Cleanup
      run: |
        rm -rf mod-source
        rm -rf artifacts
